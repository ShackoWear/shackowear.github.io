<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shacko Wear | Aile Boyu Moda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00ff88; --dark: #0a0a0a; --card: #151515; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--dark); color: #fff; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .category-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .cat-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--accent); background: transparent; color: var(--accent); white-space: nowrap; cursor: pointer; font-size: 0.8em; }
        .cat-btn.active-cat { background: var(--accent); color: #000; }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 900px; margin: 20px auto; padding-bottom: 100px; }
        .p-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; text-align: center; display: flex; flex-direction: column; }
        .p-img { width: 100%; height: 140px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 2em; }
        .p-info { padding: 10px; flex-grow: 1; }
        .p-title { font-size: 0.8em; font-weight: 600; margin-bottom: 5px; }
        .p-price { color: var(--accent); font-weight: bold; margin-bottom: 10px; }
        
        /* Beden Seçimi Stili */
        .size-selector { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; }
        .size-btn { width: 25px; height: 25px; font-size: 0.6em; border: 1px solid #444; background: #222; color: #fff; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .size-btn:hover, .size-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn-buy { width: 100%; padding: 10px; border: none; border-radius: 5px; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; font-size: 0.8em; }
        
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 30px; padding: 40px; width: 85%; max-width: 400px; margin: 60px auto; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #222; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="authPage" class="page active">
        <div class="glass-card">
            <h1 style="font-family: 'Montserrat'; color: var(--accent);">SHACKO WEAR</h1>
            <div id="loginForm">
                <input type="email" id="lEmail" placeholder="E-posta">
                <input type="password" id="lPass" placeholder="Şifre">
                <button class="btn-buy" onclick="handleLogin()">GİRİŞ YAP</button>
                <p style="font-size: 0.8em; margin-top: 20px;">Hesabın yok mu? <a href="#" onclick="toggleAuth(false)" style="color:var(--accent)">Kayıt Ol</a></p>
            </div>
            <div id="registerForm" style="display: none;">
                <input type="email" id="rEmail" placeholder="E-posta">
                <input type="password" id="rPass" placeholder="Şifre (Min. 6 Karakter)">
                <button class="btn-buy" onclick="handleRegister()">KAYIT OL</button>
                <p style="font-size: 0.8em; margin-top: 20px;">Zaten üye misin? <a href="#" onclick="toggleAuth(true)" style="color:var(--accent)">Giriş Yap</a></p>
            </div>
        </div>
    </div>

    <div id="shopPage" class="page">
        <div class="category-nav">
            <button class="cat-btn active-cat" onclick="filterCat('all', this)">Hepsi</button>
            <button class="cat-btn" onclick="filterCat('erkek', this)">Erkek</button>
            <button class="cat-btn" onclick="filterCat('kadin', this)">Kadın</button>
            <button class="cat-btn" onclick="filterCat('erkek-cocuk', this)">Erkek Çocuk</button>
            <button class="cat-btn" onclick="filterCat('kiz-cocuk', this)">Kız Çocuk</button>
        </div>

        <div class="product-grid" id="mainGrid"></div>

        <div style="text-align: center; padding: 20px;">
            <button onclick="handleLogout()" style="background:none; border:none; color:#555; font-size: 0.8em;">Çıkış Yap</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, cat: 'erkek', title: 'Oversize Siyah Tişört', price: 350, icon: '👕', sizes: ['S', 'M', 'L', 'XL'] },
            { id: 2, cat: 'kadin', title: 'Crop Top Sweatshirt', price: 450, icon: '👚', sizes: ['S', 'M', 'L'] },
            { id: 3, cat: 'erkek-cocuk', title: 'Superhero Takım', price: 250, icon: '👦', sizes: ['4-6Y', '7-9Y', '10-12Y'] },
            { id: 4, cat: 'kiz-cocuk', title: 'Puantiyeli Elbise', price: 300, icon: '👗', sizes: ['4-6Y', '7-9Y', '10-12Y'] },
            { id: 5, cat: 'erkek', title: 'Siyah Kargo Pantolon', price: 600, icon: '👖', sizes: ['30', '32', '34', '36'] },
            { id: 6, cat: 'kadin', title: 'Yüksek Bel Jean', price: 550, icon: '👖', sizes: ['34', '36', '38', '40'] }
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyCLds70T1pcQagPA7PI8hts06IRluGoX7E",
            authDomain: "shackodigital.firebaseapp.com",
            projectId: "shackodigital",
            storageBucket: "shackodigital.firebasestorage.app",
            messagingSenderId: "926443383609",
            appId: "1:926443383609:web:180a2ea7795b7f833216e8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function selectSize(btn) {
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function filterCat(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);

            filtered.forEach(p => {
                let sizeButtons = p.sizes.map(s => `<button class="size-btn" onclick="selectSize(this)">${s}</button>`).join('');
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-img">${p.icon}</div>
                        <div class="p-info">
                            <div class="p-title">${p.title}</div>
                            <div class="p-price">${p.price} TL</div>
                            <div class="size-selector">${sizeButtons}</div>
                            <button class="btn-buy" onclick="window.location.href='https://www.shopier.com/ShackoDigital'">Satın Al</button>
                        </div>
                    </div>
                `;
            });
        }

        auth.onAuthStateChanged((user) => {
            if (user) { 
                showPage('shopPage');
                filterCat('all', document.querySelector('.cat-btn'));
            } else { showPage('authPage'); }
        });

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function toggleAuth(isLogin) { document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none'; document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block'; }
        function handleRegister() { const e = document.getElementById('rEmail').value; const p = document.getElementById('rPass').value; auth.createUserWithEmailAndPassword(e, p).catch(err => alert(err.message)); }
        function handleLogin() { const e = document.getElementById('lEmail').value; const p = document.getElementById('lPass').value; auth.signInWithEmailAndPassword(e, p).catch(err => alert("Hatalı Giriş!")); }
        function handleLogout() { auth.signOut(); }
    </script>
</body>
</html>
