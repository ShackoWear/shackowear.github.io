<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shacko Wear | Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --dark-green: #0a2e1d; --black: #050505; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--black); color: #fff; }
        
        /* Sayfa Katmanları */
        .page-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; overflow-y: auto; z-index: 10; }
        .active-page { display: block !important; }

        /* GİRİŞ EKRANI (Üst Üste Binmeyi Önlemek İçin Fixed) */
        #authPage { background: radial-gradient(circle, var(--dark-green) 0%, var(--black) 100%); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: rgba(17,17,17,0.95); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px 25px; width: 85%; max-width: 360px; text-align: center; border: 1px solid rgba(212,175,55,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .logo-main { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 3em; line-height: 0.8; margin: 0; }
        .logo-sub { font-size: 0.6em; letter-spacing: 4px; text-transform: uppercase; margin: 15px 0 30px; opacity: 0.7; }

        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: 1px solid #222; background: rgba(0,0,0,0.5); color: #fff; box-sizing: border-box; outline: none; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--gold); color: #000; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .toggle-text { margin-top: 20px; font-size: 0.8em; color: #888; cursor: pointer; text-decoration: underline; }

        /* MAĞAZA EKRANI */
        #shopPage { background: var(--black); z-index: 50; padding: 0; }
        .nav-bar { position: sticky; top: 0; background: #000; z-index: 1000; padding: 15px; border-bottom: 1px solid #111; display: flex; gap: 10px; overflow-x: auto; }
        .nav-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #fff; white-space: nowrap; font-size: 0.8em; cursor: pointer; }
        .nav-btn.active-nav { background: var(--gold); color: #000; border-color: var(--gold); }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; padding-bottom: 120px; }
        .item-card { background: #111; border-radius: 20px; border: 1px solid #222; text-align: center; padding: 15px; display: flex; flex-direction: column; }
        .item-title { font-size: 0.8em; font-weight: 600; margin: 10px 0; min-height: 35px; }
        .size-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 15px; }
        .s-btn { padding: 4px 8px; font-size: 0.6em; border: 1px solid #333; border-radius: 6px; background: transparent; color: #fff; cursor: pointer; }
        .s-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); }
        .buy-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--gold); color: #000; font-weight: 800; font-size: 0.7em; text-transform: uppercase; }

        /* FOOTER */
        .insta-footer { text-align: center; padding: 30px; background: #000; }
        .insta-link { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: #fff; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 0.8em; display: inline-block; }
        .logout-link { display: block; margin-top: 20px; color: #555; font-size: 0.7em; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authPage" class="page-layer active-page">
        <div class="auth-card">
            <h1 class="logo-main">SHACKO</h1>
            <h1 class="logo-main" style="margin-top:-10px;">WEAR</h1>
            <p class="logo-sub">Premium Collection Adana</p>
            
            <div id="loginSection">
                <input type="email" id="lEmail" placeholder="E-posta">
                <input type="password" id="lPass" placeholder="Şifre">
                <button class="btn-action" onclick="doAuth('login')">GİRİŞ YAP</button>
                <div class="toggle-text" onclick="showReg(true)">Hesabın yok mu? Kayıt Ol</div>
            </div>

            <div id="regSection" style="display:none;">
                <input type="email" id="rEmail" placeholder="Yeni E-posta">
                <input type="password" id="rPass" placeholder="Şifre Oluştur">
                <button class="btn-action" onclick="doAuth('reg')">KAYIT OL VE BAŞLA</button>
                <div class="toggle-text" onclick="showReg(false)">Zaten üye misin? Giriş Yap</div>
            </div>
        </div>
    </div>

    <div id="shopPage" class="page-layer">
        <div class="nav-bar">
            <button class="nav-btn active-nav" onclick="filter('all', this)">Tümü</button>
            <button class="nav-btn" onclick="filter('erkek', this)">Erkek</button>
            <button class="nav-btn" onclick="filter('kadin', this)">Kadın</button>
            <button class="nav-btn" onclick="filter('pantolon', this)">Düz Pantolon</button>
            <button class="nav-btn" onclick="filter('takim', this)">Takımlar</button>
        </div>

        <div class="grid-container" id="productGrid"></div>

        <div class="insta-footer">
            <a href="https://instagram.com/shackowear" target="_blank" class="insta-link">📸 SHACKO INSTAGRAM</a>
            <div class="logout-link" onclick="firebase.auth().signOut()">Oturumu Kapat</div>
        </div>
    </div>

    <script>
        const db = [
            { cat: 'erkek', title: 'V Yaka Slim Tişört', sizes: ['S','M','L','XL','XXL'] },
            { cat: 'erkek', title: 'Basic Oversize Tişört', sizes: ['S','M','L','XL'] },
            { cat: 'kadin', title: 'Fitilli Crop Top', sizes: ['XS','S','M','L'] },
            { cat: 'kadin', title: 'Yüksek Bel Tayt', sizes: ['S','M','L','XL'] },
            { cat: 'pantolon', title: 'Siyah Kargo Pantolon', sizes: ['28','29','30','32','34'] },
            { cat: 'pantolon', title: 'Lacivert Düz Pantolon', sizes: ['28','30','32','34'] },
            { cat: 'takim', title: 'Oversize Eşofman Takımı', sizes: ['S','M','L','XL'] },
            { cat: 'takim', title: 'Düz Jogger Takımı', sizes: ['S','M','L','XL'] }
        ];

        const fbConfig = {
            apiKey: "AIzaSyCLds70T1pcQagPA7PI8hts06IRluGoX7E",
            authDomain: "shackodigital.firebaseapp.com",
            projectId: "shackodigital",
            storageBucket: "shackodigital.firebasestorage.app",
            messagingSenderId: "926443383609",
            appId: "1:926443383609:web:180a2ea7795b7f833216e8"
        };
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth();

        function showReg(show) {
            document.getElementById('loginSection').style.display = show ? 'none' : 'block';
            document.getElementById('regSection').style.display = show ? 'block' : 'none';
        }

        function doAuth(mode) {
            const email = mode === 'login' ? document.getElementById('lEmail').value : document.getElementById('rEmail').value;
            const pass = mode === 'login' ? document.getElementById('lPass').value : document.getElementById('rPass').value;
            if(!email || !pass) return alert("Alanları doldur kanka!");

            if(mode === 'login') {
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Hata: " + e.message));
            } else {
                auth.createUserWithEmailAndPassword(email, pass).catch(e => alert("Hata: " + e.message));
            }
        }

        function filter(c, btn) {
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
                btn.classList.add('active-nav');
            }
            const g = document.getElementById('productGrid');
            g.innerHTML = '';
            const items = c === 'all' ? db : db.filter(i => i.cat === c);
            
            items.forEach(i => {
                let sz = i.sizes.map(s => `<button class="s-btn" onclick="this.parentElement.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('selected'));this.classList.add('selected')">${s}</button>`).join('');
                g.innerHTML += `<div class="item-card"><div style="font-size:2em">👕</div><div class="item-title">${i.title}</div><div class="size-box">${sz}</div><button class="buy-btn" onclick="window.location.href='https://shopier.com/ShackoWear'">SATIN AL</button></div>`;
            });
        }

        // ASIL YÖNLENDİRME BURASI (Sihirli Kısım)
        auth.onAuthStateChanged(user => {
            const authPage = document.getElementById('authPage');
            const shopPage = document.getElementById('shopPage');
            
            if (user) {
                authPage.classList.remove('active-page'); // Giriş panelini komple yok et
                shopPage.classList.add('active-page');   // Mağazayı getir
                filter('all');
            } else {
                shopPage.classList.remove('active-page');
                authPage.classList.add('active-page');
            }
        });
    </script>
</body>
</html>
