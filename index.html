<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shacko Wear | Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --black: #050505; --card-bg: #111; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--black); color: #fff; overflow-x: hidden; }
        
        /* Sayfa Düzeni */
        .page { display: none; padding: 15px; min-height: 100vh; }
        .active { display: flex; flex-direction: column; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Giriş Ekranı */
        .auth-container { background: var(--card-bg); border-radius: 35px; padding: 45px 30px; width: 85%; max-width: 380px; margin: 60px auto; text-align: center; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--gold); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* Kategori Menüsü */
        .category-nav { display: flex; overflow-x: auto; gap: 8px; padding: 15px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #111; scrollbar-width: none; }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #fff; white-space: nowrap; cursor: pointer; font-size: 0.75em; font-weight: 600; transition: 0.3s; }
        .cat-btn.active-cat { background: var(--gold); color: #000; border-color: var(--gold); }

        /* Ürün Kartları */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 900px; margin: 10px auto; padding-bottom: 80px; }
        .p-card { background: var(--card-bg); border-radius: 20px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; text-align: center; }
        .p-img { width: 100%; height: 135px; display: flex; align-items: center; justify-content: center; font-size: 2.2em; background: #181818; color: var(--gold); }
        .p-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .p-title { font-size: 0.8em; font-weight: 600; color: #eee; min-height: 35px; margin-bottom: 10px; line-height: 1.2; }
        
        .size-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 15px; }
        .size-btn { padding: 5px 9px; font-size: 0.65em; border: 1px solid #333; background: transparent; color: #fff; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .size-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); }
        
        .btn-buy { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--gold); color: #000; font-weight: 800; cursor: pointer; font-size: 0.75em; text-transform: uppercase; }
        #logoutBtn { margin: 25px auto; background: none; border: 1px solid #333; color: #666; padding: 10px 25px; border-radius: 12px; cursor: pointer; font-size: 0.75em; display: block; }
    </style>
</head>
<body>

    <div id="authPage" class="page active">
        <div class="auth-container">
            <h1 style="font-family:'Playfair Display'; color:var(--gold); font-size:2.8em; margin:0; letter-spacing:-1px;">Shacko Wear</h1>
            <p style="font-size:0.65em; color:#666; margin-bottom:30px; letter-spacing: 3px; text-transform: uppercase;">Since 2026</p>
            <input type="email" id="lEmail" placeholder="E-posta Adresiniz">
            <input type="password" id="lPass" placeholder="Şifreniz">
            <button class="btn-main" onclick="handleLogin()">Mağazaya Gir</button>
        </div>
    </div>

    <div id="shopPage" class="page">
        <div class="category-nav">
            <button class="cat-btn active-cat" onclick="filterCat('all', this)">Tümü</button>
            <button class="cat-btn" onclick="filterCat('erkek', this)">Erkek</button>
            <button class="cat-btn" onclick="filterCat('kadin', this)">Kadın</button>
            <button class="cat-btn" onclick="filterCat('pantolon', this)">Düz Pantolon</button>
            <button class="cat-btn" onclick="filterCat('cocuk', this)">Çocuk</button>
            <button class="cat-btn" onclick="filterCat('esofman', this)">Eşofman Takım</button>
        </div>
        
        <div class="product-grid" id="mainGrid"></div>
        
        <button id="logoutBtn" onclick="handleLogout()">Oturumu Kapat</button>
    </div>

    <script>
        // ÜRÜN VERİLERİ (Bedenler Tamamen Güncellendi)
        const products = [
            // ERKEK
            { id: 1, cat: 'erkek', title: 'V Yaka Slim Tişört', icon: '👕', sizes: ['S','M','L','XL','XXL'] },
            { id: 2, cat: 'erkek', title: 'Basic Oversize Tişört', icon: '👕', sizes: ['S','M','L','XL'] },

            // KADIN
            { id: 3, cat: 'kadin', title: 'Premium Crop Top', icon: '👚', sizes: ['S','M','L'] },
            { id: 4, cat: 'kadin', title: 'Düz Tayt', icon: '🩱', sizes: ['S','M','L','XL'] },
            { id: 5, cat: 'kadin', title: 'Gecelik Takımı', icon: '👗', sizes: ['S','M','L','XL'] },

            // DÜZ PANTOLONLAR (Bedeni tam istediğin gibi 28-36)
            { id: 6, cat: 'pantolon', title: 'Siyah Düz Pantolon', icon: '👖', sizes: ['28','29','30','31','32','33','34','36'] },
            { id: 7, cat: 'pantolon', title: 'Lacivert Düz Pantolon', icon: '👖', sizes: ['28','30','32','34','36'] },

            // ÇOCUK
            { id: 8, cat: 'cocuk', title: 'Kız Çocuk', icon: '👗', sizes: ['4-6Y','7-9Y','10-12Y'] },
            { id: 9, cat: 'cocuk', title: 'Erkek Çocuk', icon: '👦', sizes: ['4-6Y','7-9Y','10-12Y'] },

            // EŞOFMAN
            { id: 10, cat: 'esofman', title: 'Oversize Eşofman Takımı', icon: '👟', sizes: ['S','M','L','XL'] },
            { id: 11, cat: 'esofman', title: 'Düz Jogger Takımı', icon: '👟', sizes: ['S','M','L','XL'] }
        ];

        // FIREBASE YAPILANDIRMASI
        const firebaseConfig = {
            apiKey: "AIzaSyCLds70T1pcQagPA7PI8hts06IRluGoX7E",
            authDomain: "shackodigital.firebaseapp.com",
            projectId: "shackodigital",
            storageBucket: "shackodigital.firebasestorage.app",
            messagingSenderId: "926443383609",
            appId: "1:926443383609:web:180a2ea7795b7f833216e8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // GİRİŞ / ÇIKIŞ
        function handleLogin() {
            const e = document.getElementById('lEmail').value;
            const p = document.getElementById('lPass').value;
            if(!e || !p) { alert("Lütfen alanları doldurun!"); return; }
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Giriş Başarısız! Bilgileri kontrol edin."));
        }
        function handleLogout() { auth.signOut(); }

        // BEDEN SEÇİMİ
        function selectSize(btn) {
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        // MAĞAZA FİLTRELEME
        function filterCat(category, btn) {
            if(btn) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
                btn.classList.add('active-cat');
            }
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);
            
            filtered.forEach(p => {
                let sizeHtml = p.sizes.map(s => `<button class="size-btn" onclick="selectSize(this)">${s}</button>`).join('');
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="p-img">${p.icon}</div>
                        <div class="p-info">
                            <div class="p-title">${p.title}</div>
                            <div class="size-selector">${sizeHtml}</div>
                            <button class="btn-buy" onclick="window.location.href='https://www.shopier.com/ShackoWear'">Siparişi Tamamla</button>
                        </div>
                    </div>
                `;
            });
        }

        // OTURUM KONTROLÜ
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('authPage').classList.remove('active');
                document.getElementById('shopPage').classList.add('active');
                filterCat('all');
            } else {
                document.getElementById('shopPage').classList.remove('active');
                document.getElementById('authPage').classList.add('active');
            }
        });
    </script>
</body>
</html>
